<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>喝了么 · 提醒时间</title>

<link rel="stylesheet" href="styles.css?v=2" />
</head>
<body>
<div class="phone-stage">
  <div class="phone">
    <div class="phone-frame">

      <div class="status-bar">
        <span>9:41</span>
        <div class="right"><span>5G</span><span class="dot"></span><span>100%</span></div>
      </div>

      <div class="topbar">
        <div class="left">
          <a href="index.html" class="icon-btn" aria-label="返回首页">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="15 18 9 12 15 6"/></svg>
          </a>
        </div>
        <h2>提醒时间</h2>
        <div class="right">
          <div class="icon-btn" onclick="openDialog('dialog-reminder')" aria-label="添加提醒时间">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </div>
        </div>
      </div>

      <div class="screen">
        <div class="hero-label">Schedule</div>
        <div class="hero-title">Reminder <span class="small">times</span></div>
        <p class="hero-zh">共 4 个时间点 · 全部启用</p>

        <ul class="numbered" style="margin-top: 16px;">
          <li>
            <div>
              <div style="display: flex; justify-content: space-between; align-items: baseline;">
                <b>08:30 · 早起第一杯</b>
                <div class="switch on" onclick="toggleSwitch(this); event.stopPropagation();"></div>
              </div>
              <p>每日 · 200 ml</p>
            </div>
          </li>
          <li>
            <div>
              <div style="display: flex; justify-content: space-between; align-items: baseline;">
                <b>11:00 · 上午补水</b>
                <div class="switch on" onclick="toggleSwitch(this); event.stopPropagation();"></div>
              </div>
              <p>每日 · 250 ml</p>
            </div>
          </li>
          <li>
            <div>
              <div style="display: flex; justify-content: space-between; align-items: baseline;">
                <b>15:00 · 下午茶</b>
                <div class="switch on" onclick="toggleSwitch(this); event.stopPropagation();"></div>
              </div>
              <p>每日 · 300 ml</p>
            </div>
          </li>
          <li>
            <div>
              <div style="display: flex; justify-content: space-between; align-items: baseline;">
                <b>19:30 · 晚饭前</b>
                <div class="switch on" onclick="toggleSwitch(this); event.stopPropagation();"></div>
              </div>
              <p>每日 · 200 ml</p>
            </div>
          </li>
        </ul>

        <button class="btn-secondary" style="margin-top: 20px;" onclick="openDialog('dialog-reminder')">+ 添加时间点</button>
      </div>

      <div class="bottom-nav">
        <a href="index.html" class="item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 12 L12 4 L21 12 M5 10 V20 H19 V10"/></svg>
          <span>首页</span>
        </a>
        <a href="records.html" class="item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="17"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/></svg>
          <span>记录</span>
        </a>
        <a href="reminder-times.html" class="item active">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 3 a9 9 0 0 1 9 9 c0 4-3 6-3 9 H6 c0-3-3-5-3-9 a9 9 0 0 1 9-9 z"/><line x1="9" y1="14" x2="15" y2="14"/></svg>
          <span>提醒</span>
        </a>
        <a href="person-types.html" class="item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="8" r="4"/><path d="M4 21 a8 8 0 0 1 16 0"/></svg>
          <span>类型</span>
        </a>
      </div>

      <div class="overlay"></div>

      <!-- 添加/编辑提醒对话框 -->
      <div class="dialog" id="dialog-reminder">
        <div class="dialog-title">添加提醒时间</div>
        <div class="dialog-body">
          <div class="form-group">
            <label class="form-label">Time</label>
            <input type="time" class="form-input" value="08:30" />
          </div>
          <div class="form-group">
            <label class="form-label">Amount</label>
            <input type="number" class="form-input" value="200" />
          </div>
          <div class="form-group">
            <label class="form-label">Label</label>
            <input type="text" class="form-input" value="早起第一杯" />
          </div>
        </div>
        <div class="dialog-actions">
          <button class="btn-secondary" onclick="closeDialog('dialog-reminder')">取消</button>
          <button class="btn-primary" onclick="closeDialog('dialog-reminder')">保存</button>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="scripts.js?v=2"></script>
</body>
</html>
