<div class="phone-stage">
  <div class="phone">
    <div class="phone-frame">

      <div class="status-bar">
        <span>9:41</span>
        <div class="right"><span>5G</span><span class="dot"></span><span>100%</span></div>
      </div>

      <div class="topbar">
        <div class="left">
          <a href="index.html" class="icon-btn" aria-label="返回首页">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="15 18 9 12 15 6"/></svg>
          </a>
        </div>
        <h2>人群类型</h2>
        <div class="right">
          <a href="person-type-edit.html" class="icon-btn" aria-label="新建类型">

          </a>
        </div>
      </div>

      <div class="screen">
        <div class="hero-label">A. Curated</div>
        <div class="hero-title">Person <span class="small">types</span></div>
        <p class="hero-zh">根据你的身份选择合适的饮水量。</p>

        <div class="card" style="margin-top: 16px;">
          <div class="card-num">No. 01</div>
          <div class="card-title">成年女性</div>
          <div class="card-text">日目标 2000ml · 单次 200ml · 间隔 120min<br>通知时段 08:00 — 21:00</div>

            <a href="person-type-edit.html" class="chip-outline">编辑</a>
          </div>
        </div>

        <div class="card-light">
          <div class="card-num">No. 02</div>
          <div style="display: flex; justify-content: space-between; align-items: baseline;">
            <div>
              <div class="card-title" style="margin: 4px 0 4px;">成年男性</div>
              <div class="card-text">日目标 2500ml · 间隔 90min</div>
            </div>

          </div>
        </div>

        <div class="card-light">
          <div class="card-num">No. 03</div>
          <div style="display: flex; justify-content: space-between; align-items: baseline;">
            <div>
              <div class="card-title" style="margin: 4px 0 4px;">青少年</div>
              <div class="card-text">日目标 1800ml · 间隔 120min</div>
            </div>
            <a href="person-type-edit.html" class="value-sm">EDIT</a>
          </div>
        </div>

        <div class="card-light">
          <div class="card-num">No. 04</div>
          <div style="display: flex; justify-content: space-between; align-items: baseline;">
            <div>
              <div class="card-title" style="margin: 4px 0 4px;">运动人群</div>
              <div class="card-text">日目标 3000ml · 间隔 60min</div>
            </div>
            <a href="person-type-edit.html" class="value-sm">EDIT</a>
          </div>
        </div>

        <a href="person-type-edit.html" class="btn-secondary" style="display: block; text-align: center; margin-top: 16px; text-decoration: none;">+ 新增自定义类型</a>
      </div>

      <div class="bottom-nav">
        <a href="index.html" class="item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 12 L12 4 L21 12 M5 10 V20 H19 V10"/></svg>
          <span>首页</span>

        <a href="records.html" class="item">

        <a href="reminder-times.html" class="item">

        </a>
        <a href="person-types.html" class="item active">
